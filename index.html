<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maroc.ac — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2563eb;
      --blue-light: #3b82f6;
      --blue-glow: rgba(37, 99, 235, 0.35);
      --gold: #f59e0b;
      --gold-light: #fbbf24;
      --bg: #04060f;
      --surface: #080d1a;
    }

    body {
      background: var(--bg);
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── Radial glow ── */
    .glow-orb {
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,.18) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: breathe 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: .7; }
      50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 2rem;
      max-width: 780px;
      width: 100%;
    }

    /* ── SVG autocomplete animation ── */
    .autocomplete-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2.8rem;
    }

    .autocomplete-box {
      position: relative;
      display: inline-flex;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid rgba(37,99,235,.4);
      border-radius: 14px;
      padding: 14px 22px 14px 18px;
      gap: 10px;
      box-shadow: 0 0 32px rgba(37,99,235,.2), inset 0 1px 0 rgba(255,255,255,.04);
      min-width: 280px;
    }

    .autocomplete-icon {
      flex-shrink: 0;
      opacity: .6;
    }

    .typed-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: .02em;
      color: #fff;
      white-space: nowrap;
    }

    .typed-text .highlight { color: var(--blue-light); }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--blue-light);
      border-radius: 2px;
      vertical-align: middle;
      animation: blink .9s step-end infinite;
      margin-left: 1px;
    }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* dropdown suggestion */
    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #0c1428;
      border: 1.5px solid rgba(37,99,235,.3);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0,0,0,.5);
      animation: dropIn .35s cubic-bezier(.16,1,.3,1) both;
      animation-delay: 2.4s;
      opacity: 0;
      animation-fill-mode: forwards;
    }

    @keyframes dropIn {
      from { opacity:0; transform:translateY(-8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      font-size: .88rem;
      color: #94a3b8;
      transition: background .2s;
      animation: itemFade .3s ease both;
    }
    .dropdown-item:nth-child(1) { animation-delay: 2.7s; opacity:0; }
    .dropdown-item:nth-child(2) { animation-delay: 2.9s; opacity:0; background: rgba(37,99,235,.12); color:#fff; }
    .dropdown-item:nth-child(3) { animation-delay: 3.1s; opacity:0; }

    @keyframes itemFade {
      from { opacity:0; transform:translateX(-6px); }
      to   { opacity:1; transform:translateX(0); }
    }

    .dropdown-item .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--blue);
      flex-shrink: 0;
    }
    .dropdown-item:nth-child(2) .dot { background: var(--gold); }

    .item-label { font-weight: 600; color: inherit; }
    .item-label span { color: var(--blue-light); }
    .item-desc { font-size: .75rem; opacity: .55; margin-left: auto; }

    /* ── Logo / Brand ── */
    .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 700;
      line-height: 1;
      margin-bottom: .4rem;
      background: linear-gradient(135deg, #fff 30%, var(--blue-light) 70%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -.03em;
    }

    .brand-sub {
      font-size: 1rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: rgba(148,163,184,.5);
      margin-bottom: 3.2rem;
    }

    /* ── Coming Soon badge ── */
    .coming-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(37,99,235,.08);
      border: 1.5px solid rgba(37,99,235,.3);
      border-radius: 100px;
      padding: 10px 24px;
      margin-bottom: 2.2rem;
    }

    .pulse-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--blue-light);
      position: relative;
      flex-shrink: 0;
    }

    .pulse-dot::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px solid var(--blue-light);
      animation: pulse-ring 1.8s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(.6); opacity: .8; }
      100% { transform: scale(2);  opacity: 0; }
    }

    .coming-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--blue-light);
    }

    .coming-text .arabic {
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      color: var(--gold);
      font-weight: 400;
      letter-spacing: 0;
      margin-left: 8px;
      opacity: .85;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 1.05rem;
      color: rgba(148,163,184,.65);
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Bottom line ── */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      margin: 2.8rem auto 1.6rem;
    }

    .footer-note {
      font-size: .78rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(100,116,139,.45);
    }

    /* ── Floating particles ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--blue-light);
      opacity: 0;
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: .6; }
      90%  { opacity: .3; }
      100% { transform: translateY(-100vh) translateX(var(--dx)); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <main class="card">

    <!-- Animated autocomplete UI -->
    <div class="autocomplete-wrap">
      <div class="autocomplete-box">
        <!-- search icon -->
        <svg class="autocomplete-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>

        <div class="typed-text" id="typed">
          <span class="highlight"></span><span class="cursor"></span>
        </div>

        <!-- dropdown -->
        <div class="dropdown">
          <div class="dropdown-item"><div class="dot"></div><div class="item-label"><span>maroc</span>.ac/discover</div><div class="item-desc">Top</div></div>
          <div class="dropdown-item"><div class="dot"></div><div class="item-label"><span>maroc</span>.ac</div><div class="item-desc">Soon</div></div>
          <div class="dropdown-item"><div class="dot"></div><div class="item-label"><span>maroc</span>.ac/explore</div><div class="item-desc">New</div></div>
        </div>
      </div>
    </div>

    <!-- Brand -->
    <h1 class="brand">maroc.ac</h1>
    <p class="brand-sub">Morocco · Knowledge · Community</p>

    <!-- Coming soon -->
    <div class="coming-badge">
      <div class="pulse-dot"></div>
      <span class="coming-text">Coming Soon <span class="arabic">· قريباً</span></span>
    </div>

    <!-- Tagline -->
    <p class="tagline">Something remarkable is being built.<br/>Stay tuned.</p>

    <div class="divider"></div>
    <p class="footer-note">maroc.ac &nbsp;·&nbsp; 2026</p>

  </main>

  <script>
    // ── Typewriter ──────────────────────────────────────────
    const words = ['maroc', 'maroc.ac', 'maroc autocomplete'];
    const highlight = document.querySelector('.typed-text .highlight');
    let wi = 0, ci = 0, deleting = false;

    function type() {
      const word = words[wi];
      if (!deleting) {
        ci++;
        highlight.textContent = word.slice(0, ci);
        if (ci === word.length) {
          if (wi === words.length - 1) return; // stop at last word
          setTimeout(() => { deleting = true; tick(); }, 1400);
          return;
        }
      } else {
        ci--;
        highlight.textContent = word.slice(0, ci);
        if (ci === 0) {
          deleting = false;
          wi = (wi + 1) % words.length;
        }
      }
      tick();
    }

    function tick() { setTimeout(type, deleting ? 55 : 95); }
    setTimeout(tick, 600);

    // ── Particles ───────────────────────────────────────────
    const container = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 2.5 + 1;
      p.style.cssText = `
        left:${Math.random()*100}%;
        bottom:${Math.random()*-20}%;
        width:${size}px; height:${size}px;
        --dx:${(Math.random()-0.5)*120}px;
        animation-duration:${6+Math.random()*10}s;
        animation-delay:${Math.random()*8}s;
        opacity:0;
      `;
      container.appendChild(p);
    }
  </script>

</body>
</html>
